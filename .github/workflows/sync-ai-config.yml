name: Sync AI Configuration

on:
  workflow_call:
    inputs:
      languages:
        description: 'Comma-separated list of languages (e.g., csharp,typescript,angular,java)'
        required: true
        type: string
      ai-systems:
        description: 'Comma-separated list of AI systems (e.g., copilot,junie,claude)'
        required: true
        type: string
      ai-base-version:
        description: 'Version/branch of ai-base to use'
        required: false
        type: string
        default: 'main'
      clear-ai-configs:
        description: 'Clear existing AI configuration files before syncing'
        required: false
        type: boolean
        default: false
      create-pull-request:
        description: 'Create a pull request instead of committing directly to the branch'
        required: false
        type: boolean
        default: false

jobs:
  sync-config:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          path: target-repo

      - name: Checkout ai-base repository
        uses: actions/checkout@v4
        with:
          repository: CreativeCodersTeam/ai-base
          ref: ${{ inputs.ai-base-version }}
          path: ai-base

      - name: Setup dotnet
        uses: actions/setup-dotnet@v4

      - name: Generate AI configuration files
        working-directory: ai-base/tools
        run: |
          bash deploy-ai-config.sh \
            --languages="${{ inputs.languages }}" \
            --ai="${{ inputs.ai-systems }}" \
            ${{ inputs.clear-ai-configs && '--cleanup' || '' }} \
            --output="../../target-repo"

      - name: Check for changes
        id: check_changes
        working-directory: target-repo
        run: |
          for item in AGENTS.md CLAUDE.md .claude .github .junie; do
            [ -e "$item" ] && git add "$item"
          done
          #git add -A
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create branch for pull request
        if: steps.check_changes.outputs.has_changes == 'true' && inputs.create-pull-request
        working-directory: target-repo
        run: |
          BRANCH_NAME="sync-ai-config-$(date +%Y%m%d-%H%M%S)"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_ENV
          git checkout -b "$BRANCH_NAME"

      - name: Commit changes
        if: steps.check_changes.outputs.has_changes == 'true'
        working-directory: target-repo
        run: |
          git config user.name "AI Config Sync Bot"
          git config user.email "ai-config-sync@users.noreply.github.com"
          git commit -m "chore: sync AI configuration from ai-base

          Languages: ${{ inputs.languages }}
          AI Systems: ${{ inputs.ai-systems }}
          AI Base Version: ${{ inputs.ai-base-version }}"

      - name: Push changes (direct commit)
        if: steps.check_changes.outputs.has_changes == 'true' && !inputs.create-pull-request
        working-directory: target-repo
        run: git push

      - name: Push changes (new branch)
        if: steps.check_changes.outputs.has_changes == 'true' && inputs.create-pull-request
        working-directory: target-repo
        run: git push origin "${{ env.branch_name }}"

      - name: Check for existing sync pull request
        if: steps.check_changes.outputs.has_changes == 'true' && inputs.create-pull-request
        id: check_pr
        working-directory: target-repo
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING_PR=$(gh pr list --state open --search "chore: sync AI configuration from ai-base in:title" --json number --jq '.[0].number')
          if [ -n "$EXISTING_PR" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "pr_number=$EXISTING_PR" >> $GITHUB_OUTPUT
            echo "Existing open sync PR found: #$EXISTING_PR – skipping PR creation."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create pull request
        if: steps.check_changes.outputs.has_changes == 'true' && inputs.create-pull-request && steps.check_pr.outputs.exists == 'false'
        working-directory: target-repo
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --title "chore: sync AI configuration from ai-base" \
            --body "## AI Configuration Sync

          This PR synchronizes AI configuration files from the ai-base repository.

          **Configuration:**
          - Languages: ${{ inputs.languages }}
          - AI Systems: ${{ inputs.ai-systems }}
          - AI Base Version: ${{ inputs.ai-base-version }}

          **Changes include:**
          - Updated agent skills and configurations
          - Synchronized AI system settings" \
            --base "${{ github.ref_name }}" \
            --head "${{ env.branch_name }}"

      - name: Summary
        run: |
          echo "## AI Configuration Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Languages:** ${{ inputs.languages }}" >> $GITHUB_STEP_SUMMARY
          echo "**AI Systems:** ${{ inputs.ai-systems }}" >> $GITHUB_STEP_SUMMARY
          echo "**AI Base Version:** ${{ inputs.ai-base-version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Changes:** ${{ steps.check_changes.outputs.has_changes }}" >> $GITHUB_STEP_SUMMARY
          echo "**Mode:** ${{ inputs.create-pull-request && 'Pull Request' || 'Direct Commit' }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_changes.outputs.has_changes }}" == "true" ] && [ "${{ inputs.create-pull-request }}" == "true" ]; then
            if [ "${{ steps.check_pr.outputs.exists }}" == "true" ]; then
              echo "**PR creation skipped:** Open sync PR #${{ steps.check_pr.outputs.pr_number }} already exists." >> $GITHUB_STEP_SUMMARY
            else
              echo "**Branch:** ${{ env.branch_name }}" >> $GITHUB_STEP_SUMMARY
            fi
          fi
