name: Sync AI Configuration

# Default configuration values.
# These can be replaced by repository variables (vars.AI_LANGUAGES, vars.AI_SYSTEMS, etc.).
# Once set as repo variables, remove the corresponding lines here
# and use ${{ vars.AI_LANGUAGES }} etc. in the jobs below.
env:
  AI_LANGUAGES: 'csharp,typescript'
  AI_SYSTEMS: 'copilot,claude,junie'
  AI_PROJECT_MARKDOWN_FILE: '' # e.g. 'docs/project-instructions.md'

on:
  workflow_dispatch:
    inputs:
      create-pull-request:
        description: 'Create a pull request instead of committing directly to the branch'
        required: false
        type: boolean
        default: true
      ai-base-version:
        description: 'Version/branch of ai-base to use'
        required: false
        type: string
        default: 'main'
  schedule:
    - cron: '0 0 * * *' # Every day at midnight

jobs:
  sync-scheduled:
    if: github.event_name == 'schedule'
    uses: CreativeCodersTeam/ai-base/.github/workflows/sync-ai-config.yml@main
    with:
      languages: ${{ env.AI_LANGUAGES }}
      ai-systems: ${{ env.AI_SYSTEMS }}
      project-markdown-file: ${{ env.AI_PROJECT_MARKDOWN_FILE }}
      ai-base-version: 'main'
      create-pull-request: true

  sync-manual:
    if: github.event_name == 'workflow_dispatch'
    uses: CreativeCodersTeam/ai-base/.github/workflows/sync-ai-config.yml@main
    with:
      languages: ${{ env.AI_LANGUAGES }}
      ai-systems: ${{ env.AI_SYSTEMS }}
      project-markdown-file: ${{ env.AI_PROJECT_MARKDOWN_FILE }}
      ai-base-version: ${{ inputs.ai-base-version }}
      create-pull-request: ${{ inputs.create-pull-request }}
